<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueMath IA</title>
    <link rel="stylesheet" href="ia.css">
</head>
<body>

    <header>
        <h1>🤖 BlueMath IA</h1>
        <p>Seu tutor inteligente de matemática</p>
    </header>

    <main>
        <div class="chat-container">
            <div id="chat-box">
                <div class="bot-message">
                    Olá! Sou a BlueMath IA. Digite uma dúvida de matemática abaixo para eu te explicar de forma simples.
                </div>
                <div class="bot-message" id="resultado" style="display: none;"></div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="pergunta"
                    placeholder="Digite sua pergunta..."
                >

                <button onclick="explicar()">
                    Explicar
                </button>
            </div>
        </div>
    </main>

    <script src="ia.js"></script>
</body>
</html>
